# This workflow is used to build and test RPM packages.  It is a
# 'workflow_dispatch' workflow, which means it gets run manually.
#
# The workflow has a dropdown menu with two options:
#
# Build RPMs - Build release RPMs and tarballs and put them into an artifact
#              ZIP file.  The directory structure used in the ZIP file mirrors
#              the ZFS yum repo.
#
# Test repo -  Test install the ZFS RPMs from the ZFS repo.  On EL distos, this
#              will do a DKMS and KMOD test install from both the regular and
#              testing repos.  On Fedora, it will do a DKMS install from the
#              regular repo.  All test install results will be displayed in the
#              Summary page.  Note that the workflow provides an optional text
#              text box where you can specify the full URL to an alternate repo.
#              If left blank, it will install from the default repo from the
#              zfs-release RPM (http://download.zfsonlinux.org).
#
# Most users will never need to use this workflow.  It will be used primary by
# ZFS admins for building and testing releases.
#
name: zfs-qemu-packages

on:
  workflow_dispatch:
    inputs:
      test_type:
        type: choice
        required: false
        default: "Build RPMs"
        description: "Build RPMs or test the repo?"
        options:
        - "Build RPMs"
        - "Test repo"
      architecture:
        type: choice
        required: false
        default: "x86_64"
        description: "Build for which architecture?"
        options:
        - "x86_64"
        - "aarch64"
        - "both"
      os_selection:
        type: string
        required: false
        default: ""
        description: |-
          (optional) Comma-separated OS list (blank = ubuntu26).
          Available: almalinux8, almalinux9, almalinux10, centos-stream9, centos-stream10, debian11, debian12, debian13, fedora43, fedora44, freebsd14-4r, freebsd15-1r, freebsd15-1s, freebsd16-0c, ubuntu22, ubuntu24, ubuntu26
      patch_level:
        type: string
        required: false
        default: ""
        description: "(optional) patch level number"
      repo_url:
        type: string
        required: false
        default: ""
        description: "(optional) repo URL (blank: use http://download.zfsonlinux.org)"
      custom_branch:
        type: string
        required: false
        default: ""
        description: "(optional) custom tag/branch to build using current CI (like 'zfs-2.2.9')"
      lookup:
        type: boolean
        required: false
        default: false
        description: "(optional) do version lookup only on repo test"

# 授予创建草稿Release、上传附件权限
permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  setup-matrix:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      matrix_include: ${{ steps.generate.outputs.matrix_include }}
    steps:
      - name: Generate matrix
        id: generate
        run: |
          INPUT_OS='${{ github.event.inputs.os_selection }}'
          INPUT_ARCH='${{ github.event.inputs.architecture }}'

          # Parse os_selection: comma-separated → JSON array, or default list.
          # Filter out empty strings from trailing commas.
          if [ -z "$INPUT_OS" ]; then
            OS_LIST='["ubuntu26"]'
          else
            OS_LIST=$(echo "$INPUT_OS" | sed 's/^[[:space:]"]*//;s/[[:space:]"]*$//' | jq -Rc 'split(",") | map(.|sub("^[[:space:]]+";"")|sub("[[:space:]]+$";"")) | map(select(length > 0))')
          fi
          echo "DEBUG: os_list=$OS_LIST"

          # Parse architecture
          if [ "$INPUT_ARCH" = "both" ]; then
            ARCH_LIST='["x86_64","aarch64"]'
          else
            ARCH_LIST="[\"$INPUT_ARCH\"]"
          fi
          echo "DEBUG: arch_list=$ARCH_LIST"

          # Build {os, arch} combinations.  For aarch64, force os=ubuntu24
          # because builds run directly on the ARM runner, not inside a QEMU VM.
          INCLUDE=$(jq -nc --argjson os "$OS_LIST" --argjson arch "$ARCH_LIST" '
            [ $arch[] as $a | $os[] as $o |
              if $a == "aarch64" then
                {os: "ubuntu24", arch: $a}
              else
                {os: $o, arch: $a}
              end
            ] | unique
          ')
          echo "matrix_include=$INCLUDE" >> $GITHUB_OUTPUT
          echo "DEBUG: matrix_include=$INCLUDE"

  zfs-qemu-packages-jobs:
    name: qemu-VMs
    needs: [ setup-matrix ]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup-matrix.outputs.matrix_include) }}
    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    steps:
    - uses: actions/checkout@v6
      with:
        # Always use the current branch's CI scripts, not the custom_branch.
        # qemu-4-build-vm.sh handles checking out custom_branch on the VM.
        ref: ${{ github.event.pull_request.head.sha || github.ref }}
        fetch-depth: 0

    # ---- x86_64: QEMU VM path ----
    - name: Setup QEMU
      if: matrix.arch == 'x86_64'
      run: .github/workflows/scripts/qemu-1-setup.sh

    - name: Start build machine
      if: matrix.arch == 'x86_64'
      run: .github/workflows/scripts/qemu-2-start.sh ${{ matrix.os }} ${{ matrix.arch }}

    - name: Install dependencies
      if: matrix.arch == 'x86_64'
      run: |
        .github/workflows/scripts/qemu-3-deps.sh --poweroff ${{ matrix.os }} ${{ matrix.arch }}

    # ---- aarch64: direct runner build (no QEMU VM) ----
    - name: Install dependencies (aarch64)
      if: matrix.arch == 'aarch64'
      timeout-minutes: 20
      run: |
        .github/workflows/scripts/qemu-3-deps-vm.sh ubuntu24
        # Running VM scripts directly on the runner requires hostname fixups.
        for ((i=0; i<=3; i++)); do
          echo "127.0.0.1 vm$i" | sudo tee -a /etc/hosts
        done

    # ---- Build (both arches) ----
    - name: Build modules or Test repo (x86_64)
      if: matrix.arch == 'x86_64'
      run: |
        set -e
        if [ "${{ github.event.inputs.test_type }}" == "Test repo" ] ; then
                # Bring VM back up and copy over zfs source
                .github/workflows/scripts/qemu-prepare-for-build.sh ${{ matrix.arch }}

                mkdir -p /tmp/repo
                EXTRA=""
                if [ "${{ github.event.inputs.lookup }}" == 'true' ] ; then
                        EXTRA="--lookup"
                fi

                ssh zfs@vm0 '$HOME/zfs/.github/workflows/scripts/qemu-test-repo-vm.sh' $EXTRA ${{ github.event.inputs.repo_url }}
        else
                EXTRA=""
                if [ -n "${{ github.event.inputs.patch_level }}" ] ; then
                        EXTRA="--patch-level ${{ github.event.inputs.patch_level }}"
                fi
                if [ -n "${{ github.event.inputs.custom_branch }}" ] ; then
                        EXTRA+=" --custom-branch ${{ github.event.inputs.custom_branch }}"
                fi

                .github/workflows/scripts/qemu-4-build.sh $EXTRA \
                        --repo --release --dkms --tarball ${{ matrix.os }} ${{ matrix.arch }}

                if [ -n "${{ github.event.inputs.custom_branch }}" ] ; then
                        echo "Built packages for ${{ github.event.inputs.custom_branch }}"
                fi
        fi

    - name: Build modules (aarch64)
      if: matrix.arch == 'aarch64'
      run: |
        set -e
        EXTRA=""
        if [ -n "${{ github.event.inputs.patch_level }}" ] ; then
                EXTRA="--patch-level ${{ github.event.inputs.patch_level }}"
        fi
        if [ -n "${{ github.event.inputs.custom_branch }}" ] ; then
                EXTRA+=" --custom-branch ${{ github.event.inputs.custom_branch }}"
        fi

        .github/workflows/scripts/qemu-4-build-vm.sh $EXTRA \
                --repo --release --dkms --tarball ubuntu24

        if [ -n "${{ github.event.inputs.custom_branch }}" ] ; then
                echo "Built packages for ${{ github.event.inputs.custom_branch }}"
        fi

    # ---- Prepare artifacts (both arches) ----
    - name: Prepare artifacts
      if: always()
      run: |
        if [ "${{ matrix.arch }}" = "x86_64" ]; then
          rsync -a zfs@vm0:/tmp/repo /tmp || true
        fi
        # aarch64: packages are already in /tmp/repo from the direct build.
        .github/workflows/scripts/replace-dupes-with-symlinks.sh /tmp/repo
        tar -cjf ${{ matrix.os }}-${{ matrix.arch }}-repo.tar.bz2 -C /tmp repo

    - uses: actions/upload-artifact@v7
      id: artifact-upload
      if: always()
      with:
        name: ${{ matrix.os }}-${{ matrix.arch }}-repo
        path: ${{ matrix.os }}-${{ matrix.arch }}-repo.tar.bz2
        retention-days: 2
        if-no-files-found: ignore

  combine_repos:
    if: always()
    needs: [setup-matrix, zfs-qemu-packages-jobs]
    name: "Results"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v8
      id: artifact-download
      if: always()
    - name: Collect and prepare tarballs
      if: always()
      run: |
        mkdir -p dist

        # The matrix jobs produce ${{ matrix.os }}-repo.tar.bz2 files.
        # download-artifact puts each artifact in a subdirectory named
        # after the artifact (e.g., ubuntu26-repo/ubuntu26-repo.tar.bz2).
        shopt -s nullglob
        for dir in *-repo/; do
          os_name="${dir%-repo/}"
          cp "$dir/${os_name}-repo.tar.bz2" "dist/${os_name}-repo.tar.bz2" || true
        done
        shopt -u nullglob

        # If we're installing from a repo, extract all tarballs to print
        # the summary of versions that got installed.
        if [ "${{ github.event.inputs.test_type }}" == "Test repo" ] ; then
          for i in dist/*.tar.bz2 ; do
            tar -xf "$i" -C /tmp
          done
          if ls /tmp/repo/*.txt &>/dev/null; then
            cd /tmp/repo
            for i in *.txt ; do
              nicename="$(echo $i | sed 's/.txt//g; s/-/ /g')"
              echo "### $nicename" >> $GITHUB_STEP_SUMMARY
              echo "|repo|RPM|URL|" >> $GITHUB_STEP_SUMMARY
              echo "|:---|:---|:---|" >> $GITHUB_STEP_SUMMARY
              awk '{print "|"$1"|"$2"|"$3"|"}' $i >> $GITHUB_STEP_SUMMARY
            done
          fi
        fi

    - uses: actions/upload-artifact@v7
      id: artifact-upload2
      if: always()
      with:
        name: all-repo
        path: dist/*.tar.bz2
        retention-days: 5
        if-no-files-found: ignore

    # 仅 Build RPMs 且填写 release_tag 才创建草稿Release并上传所有包
    - name: Create Draft Release & Upload All Build Artifacts
      if: ${{ github.event.inputs.test_type == 'Build RPMs' && github.event.inputs.custom_branch != '' }}
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.custom_branch }}
        name: Release ${{ github.event.inputs.custom_branch }}
        files: |
          dist/*.tar.bz2
        generate_release_notes: true
        draft: true
        overwrite_files: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
